version: "1"

services:
  # 1. The Cloud Backend API
  - type: web
    name: synapse-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: synapse-cloud-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"

  # 2. The Cloud Frontend React App
  - type: web
    name: synapse-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false

# 3. The Cloud PostgreSQL Database
databases:
  - name: synapse-cloud-db
    databaseName: synapse_db
    user: admin
    plan: free
